worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen       80;
        server_name  localhost;

        access_log logs/access.log;
        error_log logs/error.log;

        # API 요청 - Spring Boot
        location /api/ {
            proxy_pass http://localhost:8888/api/;
            proxy_set_header Host $host; # 백엔드 서버에 전달할 Host 헤더를 정의, Host 헤더 : 클라이언트가 요청할 때 보낸 도메인
            proxy_set_header Origin $http_origin; # 클라이언트가 요청할 때 보낸 Origin 헤더를 그대로 백엔드 서버에 전달
            proxy_set_header X-Real-IP $remote_addr; # 클라이언트의 실제 IP 주소를 백엔드 서버에 전달
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 원래 요청자의 IP 주소 체인을 전달
            proxy_set_header X-Forwarded-Proto $scheme; # 요청이 들어온 프로토콜(HTTP/HTTPS) 정보를 백엔드에 전달
        }

        # API 요청 - Spring Legacy
        location /legacy/ {
            proxy_pass http://localhost:9999/legacy/;
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Legacy JSP의 정적 자원들
        location /resources/ {
            proxy_pass http://localhost:9999/resources/;
            proxy_set_header Host $host;
        }

        # Vite 개발 서버 관련
        location /node_modules/ {
            proxy_pass http://localhost:5173/node_modules/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
        
        location /@vite/ {
            proxy_pass http://localhost:5173/@vite/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /@react-refresh {
            proxy_pass http://localhost:5173/@react-refresh;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location = /client {
            proxy_pass http://localhost:5173/client;
            proxy_set_header Host $host;
        }

        # React 정적 자원들
        location /assets/ {
            proxy_pass http://localhost:5173/assets/;
        }

        location /src/ {
            proxy_pass http://localhost:5173/src/;
        }

        location = /vite.svg {
            proxy_pass http://localhost:5173/vite.svg;
        }

        # React 클래스 페이지들
        location ~ ^/([^/]+)/classes/?(.*)$ {
            proxy_pass http://localhost:5173/$2;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # React seller 페이지들
        location /seller/ {
            proxy_pass http://localhost:5173/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # React 관리자 페이지들
        location /admin/ {
            proxy_pass http://localhost:5173/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Legacy JSP - 나머지 모든 요청
        location / {
            proxy_pass http://localhost:9999/;
            proxy_set_header Host $host;
        }
    }
}