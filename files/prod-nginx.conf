worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    client_max_body_size 0;
    client_body_timeout 300s;
    send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    server {
        listen       80;
        # listen       443 ssl;
        server_name  chachacreate.shinhanacademy.co.kr;

        # access_log logs/access.log;
        # error_log logs/error.log;
        error_page 400 /error/400;
        error_page 401 /error/401;
        error_page 404 /error/404;
        error_page 502 = /error/500;

        # 에러 페이지 처리
        location /error/ {
            proxy_pass http://192.168.0.215:8080;
        }
        # WebSocket 연결 - Spring Boot
        location ^~ /ws/chat/ {
            proxy_pass http://192.168.0.207:8080/ws/chat/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_cache_bypass $http_upgrade;
        }

        # API 요청 - Spring Boot
        location ^~ /api/ {
            proxy_pass http://192.168.0.207:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # API 요청 - Spring Legacy
        location ^~ /legacy/ {
            proxy_pass http://192.168.0.215:8080/legacy/;
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_set_header Cookie $http_cookie;
        }

        # API 요청 - FastAPI(인공지능용)
        location ^~ /ai/ {
            proxy_pass http://192.168.0.215:80/ai/;
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Legacy JSP의 정적 자원들
        location ^~ /resources/ {
            proxy_pass http://192.168.0.215:8080/resources/;
            proxy_set_header Host $host;
        }

        # React 빌드된 정적 파일들
        location ^~ /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        
        location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
            root /usr/share/nginx/html;
            try_files $uri =404;
        }

        # React seller 페이지들
        location ^~ /seller/ {
            root /usr/share/nginx/html;
            try_files $uri /index.html =404;
        }

        # React 주문 페이지들
        location ^~ /main/order {
            root /usr/share/nginx/html;
            try_files $uri /index.html =404;
        }

        # React 스토어 페이지들
        location ^~ /main/stores {
            root /usr/share/nginx/html;
            try_files $uri /index.html =404;
        }
        
        # React 스토어 페이지들
        location ^~ /main/store/ {
            root /usr/share/nginx/html;
            try_files $uri /index.html =404;
        }

        # React 개인 판매 페이지들
        location ^~ /main/sell/ {
            root /usr/share/nginx/html;
            try_files $uri /index.html =404;
        }

        # React 마이페이지 class 페이지
        location ~ ^/([^/]+)/mypage {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        # React 클래스 페이지들
        location ~ ^/([^/]+)/classes {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        # React 상품 페이지들
        location ~ ^/([^/]+)/products {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        # Legacy JSP - 나머지 모든 요청
        location / {
            proxy_pass http://192.168.0.215:8080/;
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }
    }
}