worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    client_max_body_size 0;
    client_body_timeout 300s;
    send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    server {
        listen       80;
        listen       443 ssl;
        server_name  chachacreate.shinhanacademy.co.kr;

        access_log logs/access.log;
        error_log logs/error.log;

        # WebSocket 연결 - Spring Boot
        location /ws/chat/ {
            proxy_pass http://localhost:8888/ws/chat/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_cache_bypass $http_upgrade;
        }

        # API 요청 - Spring Boot
        location /api/ {
            proxy_pass http://localhost:8888/api/;
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # API 요청 - Spring Legacy
        location /legacy/ {
            proxy_pass http://localhost:9999/legacy/;
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Legacy JSP의 정적 자원들
        location /resources/ {
            proxy_pass http://localhost:9999/resources/;
            proxy_set_header Host $host;
        }

        # React 빌드된 정적 파일들
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # React 클래스 페이지들
        location ~ ^/([^/]+)/classes/?(.*)$ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # React 클래스 페이지들
        location ~ ^/([^/]+)/products/?(.*)$ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # React 마이페이지 class 페이지
        location ~ ^/([^/]+)/mypage/classes/?(.*)$ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # React seller 페이지들
        location /seller/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # React 스토어 페이지들
        location /main/stores/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # React 개인 판매 페이지들
        location /main/sell/ {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # # React 관리자 페이지들
        # location /admin/ {
        #     root /usr/share/nginx/html;
        #     try_files $uri $uri/ /index.html;
        # }

        # Legacy JSP - 나머지 모든 요청
        location / {
            proxy_pass http://localhost:9999/;
            proxy_set_header Host $host;
        }
    }
}