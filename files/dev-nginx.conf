worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    
    client_max_body_size 0; # 무제한 업로드 허용
    client_body_timeout 300s; # 각 데이터 조각(chunk) 사이에 기다릴 수 있는 최대 시간
    send_timeout 300s; # 클라이언트가 다음 데이터를 받을 준비를 하지 않고 대기하는 최대 시간
    proxy_read_timeout 300s; # 응답을 읽는데 걸리는 최대 시간
    proxy_send_timeout 300s; # 데이터를 보내는데 걸리는 최대 시간

    server {
        listen       80;
        server_name  localhost;

        access_log logs/access.log;
        error_log logs/error.log;
        error_page 400 /error/400;
        error_page 401 /error/401;
        error_page 404 /error/404;
        error_page 502 = /error/500;

        # 에러 페이지 처리
        location /error/ {
            proxy_pass http://localhost:9999;
        }
        # WebSocket 연결 - Spring Boot (채팅)
        location ^~ /ws/chat/ {
            proxy_pass http://localhost:8888/ws/chat/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400; # 24시간 (WebSocket 긴 연결)
            proxy_send_timeout 86400;
            proxy_cache_bypass $http_upgrade;
        }

        # API 요청 - Spring Boot
        location ^~ /api/ {
            proxy_pass http://localhost:8888/api/;
            proxy_set_header Host $host; # 백엔드 서버에 전달할 Host 헤더를 정의, Host 헤더 : 클라이언트가 요청할 때 보낸 도메인
            proxy_set_header Origin $http_origin; # 클라이언트가 요청할 때 보낸 Origin 헤더를 그대로 백엔드 서버에 전달
            proxy_set_header X-Real-IP $remote_addr; # 클라이언트의 실제 IP 주소를 백엔드 서버에 전달
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 원래 요청자의 IP 주소 체인을 전달
            proxy_set_header X-Forwarded-Proto $scheme; # 요청이 들어온 프로토콜(HTTP/HTTPS) 정보를 백엔드에 전달

            client_max_body_size 0;
            proxy_request_buffering off; # 임시 파일로 버퍼링할지 여부, 우리는 stream 방식
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # API 요청 - Spring Legacy
        location ^~ /legacy/ {
            proxy_pass http://localhost:9999/legacy/;
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # API 요청 - FastAPI(인공지능용)
        location ^~ /ai/ {
            proxy_pass http://localhost:8000/ai/;
            proxy_set_header Host $host;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 0;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
        # Legacy JSP의 정적 자원들
        location /resources/ {
            proxy_pass http://localhost:9999/resources/;
            proxy_set_header Host $host;
        }

        # 크롬 devtools 노이즈 억제 (로그 경고 제거)
        location = /.well-known/appspecific/com.chrome.devtools.json {
            return 204;
        }

        # React 주문 페이지들
        location ^~ /auth {
            proxy_pass http://localhost:9999/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # React - 나머지 모든 요청
        location / {
            proxy_pass http://localhost:5173/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
