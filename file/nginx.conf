worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen       80;
        server_name  localhost;

        access_log logs/access.log;
        error_log logs/error.log;

        # API 요청 - Spring Boot
        location /api/ {
            proxy_pass http://localhost:8888/api/;
            proxy_set_header Host $host;
        }

        # API 요청 - Spring Legacy
        location /legacy/ {
            proxy_pass http://localhost:9999/legacy/;
            proxy_set_header Host $host;
        }

        # Legacy JSP의 정적 자원들
        location /resources/ {
            proxy_pass http://localhost:9999/resources/;
            proxy_set_header Host $host;
        }

        # Vite 개발 서버 관련
        location /node_modules/ {
            proxy_pass http://localhost:5173/node_modules/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
        
        location /@vite/ {
            proxy_pass http://localhost:5173/@vite/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /@react-refresh {
            proxy_pass http://localhost:5173/@react-refresh;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location = /client {
            proxy_pass http://localhost:5173/client;
            proxy_set_header Host $host;
        }

        # React 정적 자원들
        location /assets/ {
            proxy_pass http://localhost:5173/assets/;
        }

        location /src/ {
            proxy_pass http://localhost:5173/src/;
        }

        location = /vite.svg {
            proxy_pass http://localhost:5173/vite.svg;
        }

        # React 클래스 페이지들
        location ~ ^/([^/]+)/classes/?(.*)$ {
            proxy_pass http://localhost:5173/$2;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # React seller 페이지들
        location /seller/ {
            proxy_pass http://localhost:5173/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # React 관리자 페이지들
        location /admin/ {
            proxy_pass http://localhost:5173/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Legacy JSP - 나머지 모든 요청
        location / {
            proxy_pass http://localhost:9999/;
            proxy_set_header Host $host;
        }
    }
}